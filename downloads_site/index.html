<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GESTION SCHOOL - Téléchargements</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { max-width: 860px; margin: 40px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    h1 { margin: 0 0 8px; }
    p { margin: 0 0 18px; color: #4b5563; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    a.btn { display: block; text-decoration: none; background: #2563eb; color: #fff; padding: 12px 14px; border-radius: 10px; text-align: center; font-weight: 600; }
    a.btn.secondary { background: #059669; }
    .muted { margin-top: 14px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>GESTION SCHOOL - Téléchargements</h1>
      <p>Utilise ces liens pour installer les versions publiées.</p>
      <div class="grid">
        <a class="btn" href="./app-release.apk">Télécharger APK Android</a>
        <a class="btn secondary" href="./gestion_school_desktop_linux.tar.gz">Télécharger Desktop Linux</a>
      </div>
      <p class="muted">Mets à jour les fichiers <code>app-release.apk</code> et <code>gestion_school_desktop_linux.tar.gz</code> dans ce dossier avant chaque release.</p>
    </div>
  </div>
</body>
</html>
